<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burguer House — Cardápio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8190e;
    --dark: #111111;
    --card-bg: #1a1a1a;
    --text: #f0ece4;
    --muted: #888;
    --accent: #f5c518;
    --radius: 14px;
    --whatsapp: #25d366;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* ── HERO ── */
  header {
    background: var(--red);
    padding: 32px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 18px,
      rgba(0,0,0,.08) 18px, rgba(0,0,0,.08) 36px
    );
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 3px;
    line-height: 1;
    position: relative;
    text-shadow: 3px 3px 0 #8b0000;
  }
  .logo span { color: var(--accent); }
  header p {
    position: relative;
    margin-top: 6px;
    font-size: .9rem;
    opacity: .85;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--dark);
  }
  .search-wrap input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 50px;
    border: 2px solid #333;
    background: #1a1a1a;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* ── NAV PILLS ── */
  .cat-nav {
    display: flex;
    gap: 8px;
    padding: 14px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0;
    background: #222;
    border: none;
    border-radius: 50px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .82rem;
    font-weight: 700;
    padding: 7px 16px;
    cursor: pointer;
    transition: background .2s, color .2s;
    white-space: nowrap;
  }
  .cat-pill.active, .cat-pill:hover { background: var(--red); color: #fff; }

  /* ── SECTION TITLE ── */
  .cat-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    padding: 28px 16px 8px;
    color: var(--accent);
    border-left: 4px solid var(--red);
    padding-left: 14px;
    margin-left: 12px;
  }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 12px;
    padding: 8px 14px;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .2s, transform .15s;
    position: relative;
  }
  .card:hover { border-color: var(--red); transform: translateY(-2px); }
  .card.in-cart { border-color: var(--accent); }

  .card-img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    background: #2a2a2a;
  }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 1/1;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }

  .card-body {
    padding: 10px 10px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .card-name {
    font-weight: 800;
    font-size: .88rem;
    line-height: 1.2;
  }
  .card-desc {
    font-size: .73rem;
    color: var(--muted);
    line-height: 1.3;
    flex: 1;
  }
  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--accent);
    margin-top: 6px;
  }

  .card-add-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 1.2rem;
    line-height: 28px;
    text-align: center;
    cursor: pointer;
    transition: background .2s, transform .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .card-add-btn:hover { background: #c0140a; transform: scale(1.12); }
  .card.in-cart .card-add-btn { background: var(--accent); color: var(--dark); }

  .badge-qty {
    display: none;
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--accent);
    color: var(--dark);
    font-weight: 900;
    font-size: .75rem;
    border-radius: 50px;
    padding: 2px 8px;
  }
  .card.in-cart .badge-qty { display: block; }

  /* ── FLOATING CART ── */
  #cart-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: #111;
    border-top: 2px solid #222;
    padding: 12px 16px;
    display: none;
    gap: 12px;
    align-items: center;
  }
  #cart-bar.visible { display: flex; }
  #cart-summary {
    flex: 1;
    font-size: .85rem;
    font-weight: 700;
  }
  #cart-summary strong { color: var(--accent); font-size: 1rem; }
  #open-cart-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 11px 20px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: .95rem;
    cursor: pointer;
    transition: background .2s;
  }
  #open-cart-btn:hover { background: #c0140a; }

  /* ── CART MODAL ── */
  #cart-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(4px);
    align-items: flex-end;
    justify-content: center;
  }
  #cart-modal.open { display: flex; }
  .cart-sheet {
    background: #161616;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 520px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp .28s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px 14px;
    border-bottom: 1px solid #282828;
  }
  .cart-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
  }
  #close-cart {
    background: #282828;
    border: none;
    color: var(--text);
    border-radius: 50%;
    width: 34px; height: 34px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  #cart-items {
    overflow-y: auto;
    flex: 1;
    padding: 10px 16px;
  }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #222;
  }
  .cart-item-name { flex: 1; font-weight: 700; font-size: .9rem; }
  .cart-item-price { color: var(--accent); font-weight: 800; font-size: .95rem; white-space: nowrap; }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    background: #2a2a2a;
    border: none;
    color: var(--text);
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .qty-btn:hover { background: var(--red); }
  .qty-num { font-weight: 800; min-width: 18px; text-align: center; }

  /* obs field */
  #obs-wrap { padding: 12px 16px 6px; }
  #obs-wrap label { font-size: .82rem; color: var(--muted); display: block; margin-bottom: 6px; }
  #obs-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .9rem;
    padding: 10px 12px;
    resize: none;
    outline: none;

  #obs-input:focus { border-color: var(--red); }

  .cart-footer {
    padding: 12px 16px 20px;
    border-top: 1px solid #282828;

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-weight: 800;
    font-size: 1rem;
  }
  .cart-total span:last-child { color: var(--accent); font-size: 1.3rem; }

  #send-whatsapp {
    width: 100%;
    background: var(--whatsapp);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .2s, transform .15s;
  }
  #send-whatsapp:hover { background: #1eab54; transform: scale(1.01); }
  #send-whatsapp svg { width: 22px; height: 22px; fill: #fff; }

  .empty-cart {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: .95rem;
  }

  /* ── SEARCH EMPTY ── */
  .no-results {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
    font-size: 1rem;
    display: none;
  }
</style>
</head>

// Filter categories with items
const CATEGORIES = MENU.filter(c => c.items.length > 0);

// Emoji map for categories without images
const CAT_EMOJI = {
  "Artesanais Burguer House": "🍔",
  "Smash Burguer": "🔥",
  "Pão Australiano": "🥖",
  "Pão Gergelim": "🌿",
  "Lanches Industriais": "🏭",
  "Natural": "🥗",
  "Sanduíches": "🥪",
  "Pastel": "🥟",
  "Bebidas": "🥤",
};

// Cart state
let cart = {}; // { id: { item, qty } }

// ══════════════════════════════════════════════
// RENDER MENU
// ══════════════════════════════════════════════
function fmtPrice(n) {
  return 'R$ ' + n.toFixed(2).replace('.', ',');
}

function buildNav() {
  const nav = document.getElementById('cat-nav');
  CATEGORIES.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (i === 0 ? ' active' : '');
    btn.textContent = (CAT_EMOJI[cat.category] || '🍽') + ' ' + cat.category;
    btn.dataset.cat = cat.category;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const section = document.getElementById('sec-' + CSS.escape(cat.category));
      if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    nav.appendChild(btn);
  });
}

function buildMenu() {
  const main = document.getElementById('menu-main');
  CATEGORIES.forEach(cat => {
    const section = document.createElement('section');
    section.id = 'sec-' + cat.category;
    section.dataset.category = cat.category;

    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = (CAT_EMOJI[cat.category] || '🍽') + ' ' + cat.category;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'cards-grid';

    cat.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'card-' + item.id;
      card.dataset.name = item.name.toLowerCase();
      card.dataset.desc = item.desc.toLowerCase();
      card.dataset.cat = cat.category.toLowerCase();

      // IMAGE LOGIC: Try to load image, fallback to placeholder
      if (item.img) {
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = 'img/' + item.img;
        img.alt = item.name;
        img.onerror = function() {
          this.style.display = 'none';
          const ph = document.createElement('div');
          ph.className = 'card-img-placeholder';
          ph.textContent = CAT_EMOJI[cat.category] || '🍽';
          card.prepend(ph);
        };
        card.appendChild(img);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'card-img-placeholder';
        placeholder.textContent = CAT_EMOJI[cat.category] || '🍽';
        card.appendChild(placeholder);
      }

      const body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML = `
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-price">${fmtPrice(item.price)}</div>
      `;
      card.appendChild(body);

      const badge = document.createElement('div');
      badge.className = 'badge-qty';
      badge.id = 'badge-' + item.id;
      card.appendChild(badge);

      const addBtn = document.createElement('button');
      addBtn.className = 'card-add-btn';
      addBtn.innerHTML = '＋';
      addBtn.title = 'Adicionar ao carrinho';
      addBtn.addEventListener('click', e => { e.stopPropagation(); addToCart(item); });
      card.appendChild(addBtn);

      card.addEventListener('click', () => addToCart(item));
      grid.appendChild(card);
    });

    section.appendChild(grid);
    main.appendChild(section);
  });
}

// ══════════════════════════════════════════════
// CART LOGIC
// ══════════════════════════════════════════════
function addToCart(item) {
  if (cart[item.id]) {
    cart[item.id].qty++;
  } else {
    cart[item.id] = { item, qty: 1 };
  }
  updateCartUI();
}

function removeFromCart(id) {
  if (cart[id]) {
    cart[id].qty--;
    if (cart[id].qty <= 0) delete cart[id];
  }
  updateCartUI();
}

function cartTotal() {
  return Object.values(cart).reduce((acc, { item, qty }) => acc + item.price * qty, 0);
}

function cartCount() {
  return Object.values(cart).reduce((acc, { qty }) => acc + qty, 0);
}

function updateCartUI() {
  const total = cartTotal();
  const count = cartCount();

  // Bar
  const bar = document.getElementById('cart-bar');
  if (count > 0) bar.classList.add('visible'); else bar.classList.remove('visible');
  document.getElementById('cart-count-label').textContent = count + (count === 1 ? ' item' : ' itens');
  document.getElementById('cart-total-label').textContent = fmtPrice(total);

  // Card badges
  CATEGORIES.forEach(cat => cat.items.forEach(item => {
    const card = document.getElementById('card-' + item.id);
    const badge = document.getElementById('badge-' + item.id);
    if (!card) return;
    const qty = cart[item.id]?.qty || 0;
    if (qty > 0) {
      card.classList.add('in-cart');
      badge.textContent = 'x' + qty;
    } else {
      card.classList.remove('in-cart');
    }
  }));

  // Modal
  renderModalItems();
  document.getElementById('modal-total').textContent = fmtPrice(total);
}

function renderModalItems() {
  const container = document.getElementById('cart-items');
  const entries = Object.values(cart);
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-cart">Seu carrinho está vazio 🛒<br>Escolha seus itens no cardápio!</div>';
    return;
  }
  container.innerHTML = '';
  entries.forEach(({ item, qty }) => {
    const el = document.createElement('div');
    el.className = 'cart-item';
    el.innerHTML = `
      <div class="cart-item-name">${item.name}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-id="${item.id}" data-action="remove">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" data-id="${item.id}" data-action="add">＋</button>
      </div>
      <div class="cart-item-price">${fmtPrice(item.price * qty)}</div>
    `;
    container.appendChild(el);
  });

  // Bind qty buttons
  container.querySelectorAll('.qty-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      if (btn.dataset.action === 'add') {
        cart[id].qty++;
      } else {
        removeFromCart(id);
      }
      updateCartUI();
    });
  });
}

// ══════════════════════════════════════════════
// WHATSAPP
// ══════════════════════════════════════════════
const WA_NUMBER = '5500000000000'; 

document.getElementById('send-whatsapp').addEventListener('click', () => {
  const entries = Object.values(cart);
  if (entries.length === 0) return;
  const obs = document.getElementById('obs-input').value.trim();

  let msg = '🍔 *Olá! Gostaria de fazer um pedido:*\n\n';
  entries.forEach(({ item, qty }) => {
    msg += `• ${qty}x ${item.name} — ${fmtPrice(item.price * qty)}\n`;
  });
  msg += `\n💰 *Total: ${fmtPrice(cartTotal())}*`;
  if (obs) msg += `\n\n📝 *Observações:* ${obs}`;
  msg += '\n\n_Pedido gerado pelo cardápio online_ 🚀';

  const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
});

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', function () {
  const q = this.value.toLowerCase().trim();
  let anyVisible = false;

  document.querySelectorAll('.card').forEach(card => {
    const match = !q || card.dataset.name.includes(q) || card.dataset.desc.includes(q) || card.dataset.cat.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) anyVisible = true;
  });

  // Hide empty sections
  document.querySelectorAll('section[id^="sec-"]').forEach(sec => {
    const visible = [...sec.querySelectorAll('.card')].some(c => c.style.display !== 'none');
    sec.style.display = visible ? '' : 'none';
  });

  document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
});

// ══════════════════════════════════════════════
// MODAL OPEN / CLOSE
// ══════════════════════════════════════════════
document.getElementById('open-cart-btn').addEventListener('click', () => {
  document.getElementById('cart-modal').classList.add('open');
  renderModalItems();
});
document.getElementById('close-cart').addEventListener('click', () => {
  document.getElementById('cart-modal').classList.remove('open');
});
document.getElementById('cart-modal').addEventListener('click', function (e) {
  if (e.target === this) this.classList.remove('open');
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
buildNav();
buildMenu();
</script>
